<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Tic-Tac-Toe (clickable)</title>
  <style>
    body{font-family:system-ui,Segoe UI,Arial;display:flex;flex-direction:column;align-items:center;margin:40px}
    #board{display:grid;grid-template-columns:repeat(3,110px);grid-gap:8px}
    .cell{width:110px;height:110px;display:flex;align-items:center;justify-content:center;font-size:56px;border:2px solid #333;cursor:pointer;user-select:none;background:#fafafa}
    #status{margin-top:16px;font-weight:600}
    button{margin-top:12px;padding:8px 12px}
  </style>
</head>
<body>
  <h2>Tic‑Tac‑Toe</h2>
  <div id="board" aria-label="tic tac toe board"></div>
  <div id="status"></div>
  <button id="reset">Restart</button>

  <script>
    const boardEl = document.getElementById('board');
    const statusEl = document.getElementById('status');
    let board = ['','','','','','','','',''];
    let player = 'X';
    let over = false;

    function render(){
      boardEl.innerHTML = '';
      board.forEach((v,i)=>{
        const cell = document.createElement('div');
        cell.className = 'cell';
        cell.textContent = v;
        cell.tabIndex = 0;
        cell.addEventListener('click', ()=> onClick(i));
        cell.addEventListener('keydown', e => { if(e.key === 'Enter' || e.key === ' ') onClick(i); });
        boardEl.appendChild(cell);
      });
      statusEl.textContent = over ? 'Game over' : `Player ${player}'s turn`;
    }

    function checkWinner(){
      const lines = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
      for(const [a,b,c] of lines){
        if(board[a] && board[a] === board[b] && board[a] === board[c]) return board[a];
      }
      return null;
    }

    function onClick(i){
      if(over || board[i]) return;
      board[i] = player;
      const w = checkWinner();
      if(w){ over = true; render(); statusEl.textContent = `Player ${w} wins!`; return; }
      if(board.every(x=>x)){ over = true; render(); statusEl.textContent = 'Draw!'; return; }
      player = player === 'X' ? 'O' : 'X';
      render();
    }

    document.getElementById('reset').addEventListener('click', ()=>{ board = ['','','','','','','','','']; player = 'X'; over = false; render(); });
    render();
  </script>
</body>
</html>
